# Logstash configuration for Solar Panel Fault Detection
input {
  tcp {
    port => 5044
    codec => json_lines
  }
  http {
    port => 8080
    codec => json
  }
}

filter {
  # Parse timestamp if present
  date {
    match => ["timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss", "yyyy-MM-dd'T'HH:mm:ss.SSS'Z'"]
    target => "@timestamp"
  }

  # Add service name
  mutate {
    add_field => { "service" => "solar-fault-detector" }
  }

  # Parse log level
  grok {
    match => { "message" => "%{LOGLEVEL:level} - %{DATA:logger} - %{GREEDYDATA:message}" }
  }

  # Extract metrics if present
  if [message] =~ /prediction|inference|cache/ {
    grok {
      match => { "message" => "Prediction completed in %{NUMBER:duration:float} seconds with confidence %{NUMBER:confidence:float}" }
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "solar-fault-logs-%{+YYYY.MM.dd}"
  }

  # Also output to stdout for debugging
  stdout {
    codec => rubydebug
  }
}