name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Install test dependencies
        run: |
          pip install pytest-cov black flake8 mypy

      - name: Run linting
        run: |
          black --check --diff src/ tests/ apps/
          flake8 src/ tests/ apps/ --max-line-length=88 --extend-ignore=E203,W503

      - name: Run type checking
        run: |
          mypy src/ --ignore-missing-imports

      - name: Run unit tests with coverage
        run: |
          PYTHONPATH=. pytest --cov=solar_fault_detector --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

      - name: Verify CLI entrypoint
        run: |
          python apps/cli/predict.py --help

  integration-test:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Start FastAPI server
        run: |
          uvicorn apps.api.fastapi_app:app --host 127.0.0.1 --port 5000 &
          sleep 10

      - name: API health check
        run: |
          curl --fail http://127.0.0.1:5000/health

      - name: Test API prediction endpoint
        run: |
          # Create a dummy image for testing
          python -c "
          from PIL import Image
          import numpy as np
          img = Image.fromarray(np.random.randint(0, 255, (64, 64, 3), dtype=np.uint8))
          img.save('test_image.jpg')
          "
          # Test prediction
          curl -X POST -F 'file=@test_image.jpg' http://127.0.0.1:5000/predict

      - name: Validate Streamlit app imports
        run: |
          python -c "import apps.api.streamlit_app; print('Streamlit app imports successfully')"

      - name: Stop background services
        if: always()
        run: |
          pkill -f uvicorn || true

  deploy:
    runs-on: ubuntu-latest
    needs: [test, integration-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Render
        run: |
          echo "Deployment would happen here"
          echo "Add your Render deployment commands"
