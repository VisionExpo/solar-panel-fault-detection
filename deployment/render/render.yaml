services:
  - type: web
    name: solar-panel-fault-detection-api
    runtime: python
    region: singapore
    plan: free

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements-prod.txt
      pip install -e .
      python -m solar_fault_detector.utils.download_model

    startCommand: |
      uvicorn apps.api.fastapi_app:app --host 0.0.0.0 --port 5000

    envVars:
      - key: PYTHON_VERSION
        value: 3.10
      - key: LOG_LEVEL
        value: INFO
